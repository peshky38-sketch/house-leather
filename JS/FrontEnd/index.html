<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Introduction</title>
</head>
<body>
   <!-- ========================= -->
    <!-- FORM EXERCISE -->
    <!-- ========================= -->

    <form id="form1" action="#" method="post">

        <p>
            <label for="form1input1">Name:</label>
            <input
                type="text"
                id="form1input1"
                placeholder="Enter your name"
            >
        </p>

        <p>
            <label for="form1input2">Email:</label>
            <input
                type="email"
                id="form1input2"
                placeholder="Enter your email"
            >
        </p>

        <button type="submit">Submit</button>

    </form>

 <div>
    <h3>Mouse Coordinates</h3>
    <p>X: <span id="x-coordinate">0</span></p>
    <p>Y: <span id="y-coordinate">0</span></p>
</div>

    <div id="div1">
        <h3>List of fruits</h3>

        <ul>
            <li class="list-item">Item 1</li>
            <li class="list-item">Item 2</li>
            <li class="list-item">Item 3</li>
        </ul>
    </div>

  <div>
        <button onclick="original()">Original</button>
        <button onclick="replace()">Replace</button>
        <button onclick="updateFruits()">UpdateFruits</button>
    </div>

    <div>
        <button id="btn-event-checker">Event checker</button>
    </div>

    <script src="domintro.js"></script>
<script src="domEvent.js"></script>
</body>
</html>
